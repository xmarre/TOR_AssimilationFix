name: temp-tortrainer-v023-build
on:
  push:
    branches:
      - temp/tortrainer-v0.2.3-build-20260723
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Reconstruct exact sources
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $d = '.tmp-tortrainer-build'
          $main64 = (Get-ChildItem "$d/TORTrainer.cs.gz.b64.*" | Sort-Object Name | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes("$d/TORTrainer.cs.gz", [Convert]::FromBase64String($main64))
          $camp64 = (Get-ChildItem "$d/CampaignTrainer.cs.gz.b64.*" | Sort-Object Name | ForEach-Object { Get-Content $_.FullName -Raw }) -join ''
          [IO.File]::WriteAllBytes("$d/CampaignTrainer.cs.gz", [Convert]::FromBase64String($camp64))
          gzip -d -f "$d/TORTrainer.cs.gz"
          gzip -d -f "$d/CampaignTrainer.cs.gz"
          $h1=(Get-FileHash "$d/TORTrainer.cs" -Algorithm SHA256).Hash.ToLowerInvariant()
          $h2=(Get-FileHash "$d/CampaignTrainer.cs" -Algorithm SHA256).Hash.ToLowerInvariant()
          if($h1 -ne 'c06c7fcf25d60c8b16a6760ef79024637e0350df6e87686da75dda92d73d6f4b'){ throw "TORTrainer.cs hash mismatch: $h1" }
          if($h2 -ne '54b71eabb020ed89fe92e3e11ea664c8c0b34092f0131cb9c859da738afb5dce'){ throw "CampaignTrainer.cs hash mismatch: $h2" }
      - name: Create CI projects
        shell: pwsh
        run: |
          $d = '.tmp-tortrainer-build'
          @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework><LangVersion>7.3</LangVersion><Nullable>disable</Nullable>
              <EnableDefaultCompileItems>false</EnableDefaultCompileItems><GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <AssemblyName>TORTrainer</AssemblyName><RootNamespace>TORTrainer</RootNamespace>
              <Version>0.2.3</Version><AssemblyVersion>0.2.3.0</AssemblyVersion><FileVersion>0.2.3.0</FileVersion>
              <DebugType>portable</DebugType>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="Bannerlord.ReferenceAssemblies" Version="1.3.15.110062" />
              <PackageReference Include="Bannerlord.MCM" Version="5.12.1" IncludeAssets="compile" />
              <PackageReference Include="Lib.Harmony" Version="2.4.2" IncludeAssets="compile" />
            </ItemGroup>
            <ItemGroup><Compile Include="TORTrainer.cs" /></ItemGroup>
          </Project>
          '@ | Set-Content "$d/TORTrainer.CI.csproj" -Encoding UTF8
          @'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>netstandard2.0</TargetFramework><LangVersion>7.3</LangVersion><Nullable>disable</Nullable>
              <EnableDefaultCompileItems>false</EnableDefaultCompileItems><GenerateAssemblyInfo>false</GenerateAssemblyInfo>
              <AssemblyName>TORTrainer.Campaign</AssemblyName><RootNamespace>TORTrainer</RootNamespace>
              <Version>0.2.3</Version><AssemblyVersion>0.2.3.0</AssemblyVersion><FileVersion>0.2.3.0</FileVersion>
              <DebugType>portable</DebugType>
            </PropertyGroup>
            <ItemGroup><PackageReference Include="Bannerlord.ReferenceAssemblies" Version="1.3.15.110062" /></ItemGroup>
            <ItemGroup><Compile Include="CampaignTrainer.cs" /></ItemGroup>
          </Project>
          '@ | Set-Content "$d/CampaignTrainer.CI.csproj" -Encoding UTF8
      - name: Restore and compile
        shell: pwsh
        run: |
          $ErrorActionPreference='Stop'
          $d='.tmp-tortrainer-build'
          dotnet build "$d/TORTrainer.CI.csproj" -c Release -v:minimal 2>&1 | Tee-Object "$d/TORTrainer-build.log"
          if($LASTEXITCODE -ne 0){ exit $LASTEXITCODE }
          dotnet build "$d/CampaignTrainer.CI.csproj" -c Release -v:minimal 2>&1 | Tee-Object "$d/CampaignTrainer-build.log"
          if($LASTEXITCODE -ne 0){ exit $LASTEXITCODE }
          New-Item -ItemType Directory -Force "$d/out" | Out-Null
          Copy-Item "$d/bin/Release/netstandard2.0/TORTrainer.dll" "$d/out/"
          Copy-Item "$d/bin/Release/netstandard2.0/TORTrainer.pdb" "$d/out/" -ErrorAction SilentlyContinue
          Copy-Item "$d/bin/Release/netstandard2.0/TORTrainer.Campaign.dll" "$d/out/"
          Copy-Item "$d/bin/Release/netstandard2.0/TORTrainer.Campaign.pdb" "$d/out/" -ErrorAction SilentlyContinue
          Get-FileHash "$d/out/*.dll" -Algorithm SHA256 | Format-Table -AutoSize | Out-String | Set-Content "$d/out/SHA256.txt"
      - name: Upload compiled binaries
        uses: actions/upload-artifact@v4
        with:
          name: TORTrainer-v0.2.3-compiled
          path: .tmp-tortrainer-build/out/*
          if-no-files-found: error
      - name: Remove temporary branch after successful artifact upload
        if: success()
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $branch='temp/tortrainer-v0.2.3-build-20260723'
          $escaped=$branch -replace '/','%2F'
          Invoke-RestMethod -Method Delete -Headers @{Authorization="Bearer $env:GH_TOKEN"; Accept='application/vnd.github+json'} -Uri "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/$escaped"
